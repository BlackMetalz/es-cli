# Release workflow - triggered on tag push
# Builds binaries for Linux + macOS and creates GitHub Release
name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v1.0.0, v0.1.0, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # fix permission to create release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'

    - name: Build Linux amd64
      run: GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o es-cli-linux-amd64 ./cmd/es-cli

    - name: Build Linux arm64
      run: GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o es-cli-linux-arm64 ./cmd/es-cli

    - name: Build macOS amd64
      run: GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o es-cli-darwin-amd64 ./cmd/es-cli

    - name: Build macOS arm64 (Apple Silicon)
      run: GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o es-cli-darwin-arm64 ./cmd/es-cli

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          es-cli-linux-amd64
          es-cli-linux-arm64
          es-cli-darwin-amd64
          es-cli-darwin-arm64
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
